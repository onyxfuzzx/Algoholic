<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoholics - AI & Data Science Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand" onclick="window.location.href='/Algoholic/index.html'">Algoholic</div>
        <div class="navbar-links">
            <a href="comingsoon.html">Academic</a>
            <a href="resources.html">Resources</a>
            <a href="comingsoon.html">Projects</a>
            <a href="comingsoon.html">Careers</a>
            <a href="comingsoon.html">Network</a>
            <div class="auth-buttons">
                <a href="signup.html" class="nav-button signup-button">Sign Up</a>
                <a href="login.html" class="nav-button login-button">Log In</a>
            </div>
        </div>
        <div class="navbar-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="hero">
        <div class="hero-content" style="width: 100%; max-width: 400px;">
            <h1 style="text-align: center; margin-bottom: 2rem;">Login</h1>
            <form id="login-form" class="form" style="width: 100%;">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="email" style="display: block; text-align: left; margin-bottom: 0.5rem;">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required 
                           style="width: 100%; padding: 0.8rem; border-radius: 5px;">
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="password" style="display: block; text-align: left; margin-bottom: 0.5rem;">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required 
                           style="width: 100%; padding: 0.8rem; border-radius: 5px;">
                </div>
                <button type="submit" class="cta-button" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
